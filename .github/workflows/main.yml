name: 🚀 Deploy Frontend to S3 + CloudFront
on:
  push:
    branches:
      - main
permissions:
  id-token: write
  contents: read
jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: eu-north-1
      S3_BUCKET: jacobm-aws-fe
      CLOUDFRONT_DISTRIBUTION_ID: E24K8RGAS79QOA
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      # 🔐 AWS Auth (OIDC)
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::097300397772:role/github-agent
          aws-region: ${{ env.AWS_REGION }}
      # 🧹 Clear old files (important)
      - name: Clear S3 bucket
        run: aws s3 rm s3://${{ env.S3_BUCKET }} --recursive
      # 📦 Upload new build
      - name: Upload to S3
        run: aws s3 sync dist s3://${{ env.S3_BUCKET }} --delete
      # ⚡ Invalidate CloudFront cache
      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
